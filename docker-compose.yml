services:
  exist:
    build:
      context: .
      args:
        BETMAS_DATA_IMAGE: ${BETMAS_DATA_IMAGE:-ghcr.io/betamasaheft/betmas-data:latest}
      secrets:
        - seed
    image: betmasweb-exist:local
    container_name: exist
    ports:
      - "8080:8080"
    # Tighter timing than Docker's defaults (30s interval, 0s start_period) -
    # nothing installs at this boot, everything is already baked in.
    healthcheck:
      test:
        [
          "CMD",
          "java",
          "org.exist.start.Main",
          "client",
          "--no-gui",
          "--user",
          "guest",
          "--password",
          "guest",
          "--xpath",
          "system:get-version()",
        ]
      interval: 2s
      timeout: 5s
      start_period: 8s
      retries: 3

  # in-memory SPARQL store used by fuseki.xqm for the RDF/SPARQL-backed
  # pages (charts, DTS, etc). Not persisted - fine for testing, not for
  # real data. Reachable as localhost:3030 from inside the exist container
  # since it shares its network namespace.
  fuseki:
    image: stain/jena-fuseki:latest
    command: ["/jena-fuseki/fuseki-server", "--mem", "/betamasaheft"]
    network_mode: "service:exist"

secrets:
  seed:
    file: ./docker/seed.xq
