name: exist-db CI

on: [push, pull_request]

concurrency:
  group: betmasweb-ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - exist-version: 6.4.1
            experimental: false
          # unstable dev build; failures here are early warnings, not blockers
          - exist-version: 7.0.0-beta3
            experimental: true

    steps:
      - uses: actions/checkout@v7

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get -y install bats

      - name: Build Expath Package
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - run: ant

      - name: Install package and start eXist instance
        run: docker run -dit -p 8080:8080 -p 8443:8443 -v ${{ github.workspace }}/build:/exist/autodeploy:ro --name exist-ci existdb/existdb:${{ matrix.exist-version }}

      - name: Wait for eXist to start
        timeout-minutes: 2
        run: |
          until docker logs exist-ci 2>&1 | grep -q "Server has started"; do
            echo "Still waiting..."
            sleep 2
          done

      - name: Run bats smoke tests
        run: bats --tap test/*.bats

      - name: Show eXist logs on failure
        if: failure()
        run: docker logs exist-ci
