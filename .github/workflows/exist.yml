name: exist-db CI

# Scope push to master/main only - a PR branch push would otherwise also
# fire push, double-triggering this workflow and showing a spurious red check.
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: betmasweb-ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get -y install bats

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - uses: docker/setup-buildx-action@v4

      # betmas-data is a private ghcr.io package; pulling needs auth too.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: betmas-bot
          password: ${{ secrets.BOT_CONTAINER_PAT }}

      # Configure under Settings -> Secrets -> Actions as SEED_XQ
      # (see docker/seed.xq.example).
      - name: Write seed.xq
        run: printf '%s\n' "$SEED_XQ" > docker/seed.xq
        env:
          SEED_XQ: ${{ secrets.SEED_XQ }}

      # Builds BetMasService + parser from source and layers them + this
      # repo's own package onto the published betmas-data base.
      - name: Build eXist image
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: betmasweb-exist:local
          load: true
          cache-from: type=gha,scope=exist
          cache-to: type=gha,mode=max,scope=exist
          secret-files: seed=docker/seed.xq

      - name: Start the stack
        run: docker compose up -d

      - name: Wait for eXist to start
        timeout-minutes: 2
        run: |
          until docker logs exist 2>&1 | grep -q "Server has started"; do
            echo "Still waiting..."
            sleep 2
          done
          # Bounded settle sleep, not a wait-for-healthy loop.
          sleep 15

      - name: Run bats smoke tests
        run: bats --tap test/*.bats

      - name: Run Cypress tests
        uses: cypress-io/github-action@v7
        with:
          install: false

      - name: Show eXist logs on failure
        if: failure()
        run: docker logs exist

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots
          path: test/cypress/screenshots/
